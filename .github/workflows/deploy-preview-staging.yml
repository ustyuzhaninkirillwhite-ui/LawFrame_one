name: deploy-preview-staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-release:
    strategy:
      matrix:
        environment:
          - preview
          - staging
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace
        run: pnpm build
      - name: Create release manifest
        env:
          LEXFRAME_DEPLOY_ENV: ${{ matrix.environment }}
          LEXFRAME_CONTRACTS_VERSION: stage12-bootstrap
          LEXFRAME_RELEASE_SHA: ${{ github.sha }}
          LEXFRAME_SMOKE_REPORT_PATH: artifacts/${{ matrix.environment }}-smoke.json
        run: node scripts/create-release-manifest.mjs
      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ matrix.environment }}
          path: artifacts/release-manifest.json

name: secret-scan

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm security:check-no-local-secrets -- --all
      - run: pnpm security:scan-secrets

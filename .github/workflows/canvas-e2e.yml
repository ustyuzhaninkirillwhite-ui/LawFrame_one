name: Canvas E2E

on:
  pull_request:
    paths:
      - "apps/web/src/features/canvas/**"
      - "apps/backend/src/modules/canvas/**"
      - "apps/backend/src/modules/workflow-compiler/**"
      - "supabase/migrations/0000*_stage16*.sql"
      - "supabase/seed/000007_stage16_canvas_live_seed.sql"
      - "tests/e2e/stage16-live-audit/**"
      - "tests/e2e/canvas/**"
      - "tests/e2e/package.json"
      - "tests/e2e/playwright.config.ts"
      - "compose.yaml"
      - ".github/workflows/canvas-e2e.yml"
  workflow_dispatch:

jobs:
  canvas-e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: corepack pnpm --filter @lexframe/e2e exec playwright install --with-deps chromium
      - name: Start local-integrated runtime
        run: docker compose --profile local-integrated up -d
      - name: Apply isolated Stage 16 live DB
        run: corepack pnpm stage16:db:apply-local
      - name: Runtime health
        run: corepack pnpm stage16:runtime:health
      - name: Stage 16 live audit
        env:
          LEXFRAME_READINESS_PROFILE: local-integrated
          ACTIVEPIECES_SIMULATE_RUNS: "0"
          NEXT_PUBLIC_ENABLE_MSW: "0"
        run: corepack pnpm --filter @lexframe/e2e exec playwright test stage16-live-audit
      - name: Collect compose logs
        if: always()
        run: docker compose --profile local-integrated logs --no-color > stage16-compose.log
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canvas-stage16-live-artifacts
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
            stage16-compose.log
          if-no-files-found: ignore

name: Workflow versioning CI

on:
  pull_request:
    paths:
      - "apps/backend/src/modules/canvas/**"
      - "apps/backend/src/modules/workflow-compiler/**"
      - "apps/backend/src/modules/activepieces/**"
      - "apps/backend/src/modules/runs/**"
      - "apps/web/src/features/canvas/**"
      - "apps/web/src/hooks/**"
      - "packages/api-client/**"
      - "packages/contracts/**"
      - "supabase/migrations/000042_stage16_14_canvas_versioning.sql"
      - ".github/workflows/workflow-versioning-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/backend/src/modules/canvas/**"
      - "apps/backend/src/modules/workflow-compiler/**"
      - "apps/backend/src/modules/activepieces/**"
      - "apps/backend/src/modules/runs/**"
      - "apps/web/src/features/canvas/**"
      - "apps/web/src/hooks/**"
      - "packages/api-client/**"
      - "packages/contracts/**"
      - "supabase/migrations/000042_stage16_14_canvas_versioning.sql"
      - ".github/workflows/workflow-versioning-ci.yml"

jobs:
  workflow-versioning:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Contracts typecheck
        run: pnpm --filter @lexframe/contracts typecheck

      - name: API client typecheck
        run: pnpm --filter @lexframe/api-client typecheck

      - name: Backend typecheck
        run: pnpm --filter @lexframe/backend typecheck

      - name: Frontend typecheck
        run: pnpm --filter @lexframe/web typecheck

      - name: Validate stage 16.14 migration marker
        run: test -f supabase/migrations/000042_stage16_14_canvas_versioning.sql

name: Canvas Security CI

on:
  pull_request:
    paths:
      - "apps/backend/src/modules/canvas/**"
      - "apps/backend/src/modules/activepieces/**"
      - "apps/web/src/features/canvas/**"
      - "apps/web/src/hooks/**"
      - "packages/contracts/src/canvas.ts"
      - "packages/contracts/src/permissions/permission-codes.ts"
      - "packages/contracts/src/errors/error-codes.ts"
      - "packages/api-client/src/index.ts"
      - "supabase/migrations/000044_stage16_16_canvas_security.sql"
      - "supabase/migrations/0000*_stage16*.sql"
      - "supabase/seed/**"
      - "compose.yaml"
      - "scripts/validate-canvas-security.mjs"
      - "scripts/stage16-*.mjs"
      - ".github/workflows/canvas-security-ci.yml"
  push:
    branches:
      - main
      - "codex/**"

jobs:
  canvas-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Contracts build
        run: corepack pnpm --filter @lexframe/contracts build
      - name: API client typecheck
        run: corepack pnpm --filter @lexframe/api-client typecheck
      - name: Backend typecheck
        run: corepack pnpm --filter @lexframe/backend typecheck
      - name: Frontend typecheck
        run: corepack pnpm --filter @lexframe/web typecheck
      - name: Canvas security validator
        run: corepack pnpm validate:canvas-security
      - name: Secret scan
        run: corepack pnpm secret-scan
      - name: Frontend bundle secret scan
        run: corepack pnpm validate:web-bundle-secrets

name: frontend-ci

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @lexframe/e2e exec playwright install chromium
      - name: Frontend gate
        run: pnpm check:frontend
      - name: E2E smoke
        run: pnpm check:e2e

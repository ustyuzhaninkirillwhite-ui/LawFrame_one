name: Workflow DSL Canvas CI

on:
  pull_request:
    paths:
      - "packages/workflow-dsl/**"
      - "packages/contracts/src/canvas/**"
      - "packages/canvas-test-fixtures/**"
      - "scripts/validate-canvas-fixtures.mjs"
      - ".github/workflows/workflow-dsl-ci.yml"
  push:
    branches:
      - main
      - "codex/**"

jobs:
  workflow-dsl:
    name: Contract / Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Contract
        run: corepack pnpm validate:canvas-fixtures
      - name: Validation
        run: corepack pnpm --filter @lexframe/workflow-dsl test:schema
      - name: Validation
        run: corepack pnpm --filter @lexframe/workflow-dsl test:operations
      - name: Validation
        run: corepack pnpm --filter @lexframe/workflow-dsl test:validation
      - name: Runtime
        run: corepack pnpm --filter @lexframe/workflow-dsl test:compiler

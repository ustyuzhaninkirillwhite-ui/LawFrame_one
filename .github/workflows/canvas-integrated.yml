name: Canvas Integrated Runtime

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/backend/src/modules/activepieces/**"
      - "apps/backend/src/modules/workflow-compiler/**"
      - "apps/backend/src/modules/canvas/**"
      - "supabase/migrations/**"
      - "supabase/seed/**"
      - "scripts/stage16-*.mjs"
      - "tests/e2e/stage16-live-audit/**"
      - "tests/e2e/canvas-activepieces/**"
      - "compose.yaml"
      - ".github/workflows/canvas-integrated.yml"

jobs:
  canvas-integrated:
    name: Integrated Readiness
    runs-on: ubuntu-latest
    env:
      LEXFRAME_READINESS_PROFILE: local-integrated
      ACTIVEPIECES_SIMULATE_RUNS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: corepack pnpm --filter @lexframe/e2e exec playwright install --with-deps chromium
      - name: Clean DB migration and seed bootstrap
        run: corepack pnpm stage16:db:bootstrap
      - name: Start local-integrated runtime
        run: docker compose --profile local-integrated up -d
      - name: Apply isolated Stage 16 runtime DB
        run: corepack pnpm stage16:db:apply-local
      - name: Runtime health
        run: corepack pnpm stage16:runtime:health
      - name: Stage 16 live audit
        run: corepack pnpm --filter @lexframe/e2e exec playwright test stage16-live-audit
      - name: Collect compose logs
        if: always()
        run: docker compose --profile local-integrated logs --no-color > stage16-compose.log
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canvas-integrated-stage16-artifacts
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
            stage16-compose.log
          if-no-files-found: ignore

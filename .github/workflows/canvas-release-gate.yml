name: Canvas Release Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/testing/canvas-v2-*.md"
      - "infra/deploy/release-manifest.example.json"
      - "packages/contracts/src/release/release-manifest.schema.json"
      - "packages/canvas-test-fixtures/**"
      - "apps/backend/src/modules/canvas/**"
      - "apps/backend/src/modules/workflow-compiler/**"
      - "apps/web/src/features/canvas/**"
      - "supabase/migrations/**"
      - "supabase/seed/**"
      - "tests/e2e/stage16-live-audit/**"
      - "tests/e2e/canvas/**"
      - "tests/e2e/canvas-activepieces/**"
      - "tests/e2e/canvas-performance/**"
      - "compose.yaml"
      - "scripts/validate-canvas-*.mjs"
      - "scripts/stage16-*.mjs"
      - ".github/workflows/canvas-release-gate.yml"

jobs:
  contract:
    name: Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Run contract checks
        run: corepack pnpm check:contracts

  validation:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Workflow DSL validation gate
        run: corepack pnpm --filter @lexframe/workflow-dsl test:validation
      - name: Backend Canvas validation coverage
        run: corepack pnpm --filter @lexframe/backend test -- canvas

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Run security checks
        run: corepack pnpm check:security

  runtime:
    name: Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Workflow compiler package smoke tests
        run: corepack pnpm --filter @lexframe/workflow-compiler test
      - name: Backend workflow compiler coverage
        run: corepack pnpm --filter @lexframe/backend test -- workflow-compiler

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    env:
      LEXFRAME_READINESS_PROFILE: local-integrated
      ACTIVEPIECES_SIMULATE_RUNS: "0"
      NEXT_PUBLIC_ENABLE_MSW: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: corepack pnpm --filter @lexframe/e2e exec playwright install --with-deps chromium
      - name: Start local-integrated runtime
        run: docker compose --profile local-integrated up -d
      - name: Apply isolated Stage 16 live DB
        run: corepack pnpm stage16:db:apply-local
      - name: Runtime health
        run: corepack pnpm stage16:runtime:health
      - name: Stage 16 live audit
        run: corepack pnpm stage16:run-live-audit
      - name: Collect compose logs
        if: always()
        run: docker compose --profile local-integrated logs --no-color > stage16-e2e-compose.log
      - name: Stop local-integrated runtime
        if: always()
        run: docker compose --profile local-integrated down -v --remove-orphans
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canvas-stage16-e2e-artifacts
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
            stage16-e2e-compose.log
          if-no-files-found: ignore

  integrated-readiness:
    name: Integrated Readiness
    runs-on: ubuntu-latest
    needs:
      - contract
      - validation
      - security
      - runtime
      - e2e
    env:
      LEXFRAME_READINESS_PROFILE: local-integrated
      ACTIVEPIECES_SIMULATE_RUNS: "0"
      NEXT_PUBLIC_ENABLE_MSW: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: corepack pnpm --filter @lexframe/e2e exec playwright install --with-deps chromium
      - name: Run integrated readiness
        run: corepack pnpm stage16:release-gate
      - name: Collect compose logs
        if: always()
        run: docker compose --profile local-integrated logs --no-color > stage16-integrated-compose.log
      - name: Stop local-integrated runtime
        if: always()
        run: docker compose --profile local-integrated down -v --remove-orphans
      - name: Upload integrated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canvas-stage16-integrated-artifacts
          path: |
            tests/e2e/playwright-report
            tests/e2e/test-results
            stage16-integrated-compose.log
            infra/deploy/release-manifest.example.json
          if-no-files-found: ignore

  performance:
    name: Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: corepack pnpm --filter @lexframe/e2e exec playwright install --with-deps chromium
      - name: Run Canvas performance checks
        run: corepack pnpm --filter @lexframe/e2e test:canvas:performance

  manifest:
    name: Manifest
    runs-on: ubuntu-latest
    needs:
      - contract
      - validation
      - security
      - runtime
      - e2e
      - integrated-readiness
      - performance
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Validate Canvas release manifest
        run: corepack pnpm canvas:release-gate

        reasonCode:
          type: [string, "null"]
        requestId:
          type: [string, "null"]
        traceId:
          type: [string, "null"]
        eventCategory:
          type: [string, "null"]
        sessionId:
          type: [string, "null"]
        dataClass:
          type: [string, "null"]
        metadata:
          type: object

    UpdateAutomationTemplateRequest:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        description:
          type: string
        requiredPermissions:
          type: array
          items:
            type: string
    CreateAutomationTemplateVersionRequest:
      type: object
      required: [version, workflow, requirements]
      properties:
        version:

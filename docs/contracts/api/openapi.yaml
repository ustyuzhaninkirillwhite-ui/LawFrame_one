      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delivery request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryRequestDetail"
  /delivery-requests/{id}/send:
    post:
      operationId: sendDeliveryRequest
      tags: [Delivery]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delivery request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryRequestDetail"
  /delivery-requests/{id}/cancel:
    post:
      operationId: cancelDeliveryRequest
      tags: [Delivery]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delivery request cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryRequestDetail"
  /delivery-requests/{id}/retry:
    post:
      operationId: retryDeliveryRequest
      tags: [Delivery]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delivery request reset for retry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryRequestDetail"
  /notifications:
    get:
      operationId: listNotifications
      tags: [Notifications]
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [all, unread, read]
        - in: query
          name: type
          required: false
          schema:
            type: string
      responses:
        "200":
          description: User-scoped notifications inbox
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [Notifications]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSummary"
  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [Notifications]
      responses:
        "200":
          description: All readable notifications marked as read
          content:
            application/json:
              schema:
                type: object
                required: [status, updatedCount]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  updatedCount:
                    type: integer
  /devices/register:
    post:
      operationId: registerDevice
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRegistrationRequest"
      responses:
        "200":
          description: Device token registered for notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisteredDevice"
  /devices/{id}:
    delete:
      operationId: removeDevice
      tags: [Notifications]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device token removed
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [removed]
  /dashboard/snapshot:
    get:
      operationId: getDashboardSnapshot
      tags: [Dashboard]
      responses:
        "200":
          description: Aggregated realtime dashboard snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSnapshot"
  /dashboard/events:
    get:
      operationId: listDashboardEvents
      tags: [Dashboard]
      parameters:
        - in: query
          name: since_sequence
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Live event journal slice for resync and gap recovery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardEventListResponse"
  /system/status:
    get:
      operationId: getSystemStatus
      tags: [Dashboard]
      responses:
        "200":
          description: Lightweight operational status summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatusSummary"
  /runtime/runs/{runId}/step-events:
    post:
      operationId: handleRuntimeStepEvent
      tags: [Activepieces Callbacks]
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivepiecesStepEventCallback"
      responses:
        "200":
          description: Runtime step callback processed
  /runtime/runs/{runId}/artifacts:
    post:
      operationId: ingestRuntimeArtifactCanonical
      tags: [Activepieces Callbacks]
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunArtifactRequest"
      responses:
        "200":
          description: Runtime artifact ingested
  /runtime/approval-gates:
    post:
      operationId: handleRuntimeApprovalGate
      tags: [Activepieces Callbacks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeApprovalGateCallback"
      responses:
        "200":
          description: Runtime approval gate processed
  /runtime/delivery-gates:
    post:
      operationId: handleRuntimeDeliveryGate
      tags: [Activepieces Callbacks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeDeliveryGateCallback"
      responses:
        "200":
          description: Runtime delivery gate processed
components:
  parameters:
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
    MemberId:
      in: path
      name: memberId
      required: true
      schema:
        type: string
    InvitationId:
      in: path
      name: invitationId
      required: true
      schema:
        type: string
    DocumentId:
      in: path
      name: documentId
      required: true
      schema:
        type: string
    VersionId:
      in: path
      name: versionId
      required: true
      schema:
        type: string
    RunId:
      in: path
      name: runId
      required: true
      schema:
        type: string
    LegalSourceId:
      in: path
      name: sourceId
      required: true
      schema:
        type: string
    LegalImportJobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
    RagRequestId:
      in: path
      name: requestId
      required: true
      schema:
        type: string
  schemas:
    ActorSummary:
      type: object
      required: [id, email, fullName, locale, timezone, onboardingStatus]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: [string, "null"]
        locale:
          type: string
        timezone:
          type: string
        onboardingStatus:
          type: string
          enum: [new, email_unconfirmed, ready]
    WorkspaceSummary:
      type: object
      required: [id, slug, name, role, status]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            [
              owner,
              admin,
              lawyer,
              assistant,
              viewer,
              security_admin,
              billing_admin,
            ]
        status:
          type: string
          enum: [active, archived, suspended]
    SessionContext:
      type: object
      required:
        [
          state,
          requestId,
          actor,
          activeWorkspace,
          workspaces,
          roles,
          permissions,
          featureFlags,
          dataPolicy,
          security,
        ]
      properties:
        state:
          type: string
          enum:
            [
              unauthenticated,
              email_unconfirmed,
              needs_workspace,
              needs_mfa,
              ready,
            ]
        requestId:
          type: string
        actor:
          oneOf:
            - $ref: "#/components/schemas/ActorSummary"
            - type: "null"
        activeWorkspace:
          oneOf:
            - $ref: "#/components/schemas/WorkspaceSummary"
            - type: "null"
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceSummary"
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        featureFlags:
          type: array
          items:
            type: string
        dataPolicy:
          type: object
          required:
            [aiAllowed, directSupabaseRead, externalDeliveryRequiresApproval]
          properties:
            aiAllowed:
              type: boolean
            directSupabaseRead:
              type: boolean
            externalDeliveryRequiresApproval:
              type: boolean
        security:
          type: object
          required:
            [
              mfaRequired,
              ssoRequired,
              sessionRisk,
              adminActionsRequireReauth,
              aiSensitiveDataPolicy,
              externalDeliveryRequiresApproval,
            ]
          properties:
            mfaRequired:
              type: boolean
            ssoRequired:
              type: boolean
            sessionRisk:
              type: string
              enum: [low, medium, high]
            adminActionsRequireReauth:
              type: boolean
            aiSensitiveDataPolicy:
              type: string
              enum: [allow, block, zdr_or_block, private_only]
            externalDeliveryRequiresApproval:
              type: boolean
    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, archived, suspended]
    WorkspaceMember:
      type: object
      required:
        [id, userId, email, fullName, role, status, joinedAt, lastActiveAt]
      properties:
        id:
          type: string
        userId:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: [string, "null"]
        role:
          type: string
        status:
          type: string
          enum: [active, removed]
        joinedAt:
          type: string
          format: date-time
        lastActiveAt:
          type: [string, "null"]
          format: date-time
    CreateWorkspaceInvitationRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            [
              owner,
              admin,
              lawyer,
              assistant,
              viewer,
              security_admin,
              billing_admin,
            ]
        expiresInDays:
          type: integer
    WorkspaceInvitation:
      type: object
      required:
        [
          id,
          email,
          role,
          status,
          expiresAt,
          createdAt,
          acceptedAt,
          revokedAt,
          deliveryMode,
        ]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        status:
          type: string
          enum: [pending, accepted, revoked, expired]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        acceptedAt:
          type: [string, "null"]
          format: date-time
        revokedAt:
          type: [string, "null"]
          format: date-time
        deliveryMode:
          type: string
          const: mock
        deliveryPreview:
          type: object
          additionalProperties: false
          properties:
            acceptToken:
              type: string
            acceptUrl:
              type: string
              format: uri
    AcceptWorkspaceInvitationRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    UpdateWorkspaceMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum:
            [
              owner,
              admin,
              lawyer,
              assistant,
              viewer,
              security_admin,
              billing_admin,
            ]
    RoleDefinition:
      type: object
      required: [code, label, description, permissions]
      properties:
        code:
          type: string
        label:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
    PermissionDefinition:
      type: object
      required: [code, label, description, scope, highRisk]
      properties:
        code:
          type: string
        label:
          type: string
        description:
          type: string
        scope:
          type: string
          enum:
            [
              workspace,
              profile,
              document,
              module,
              automation,
              activepieces,
              moderation,
              recommendation,
              billing,
              audit,
            ]
        highRisk:
          type: boolean
    SecurityAccountState:
      type: object
      required:
        [
          userId,
          email,
          emailConfirmed,
          assuranceLevel,
          mfaRequiredForAdminActions,
          currentRoles,
          activeSessionCount,
          ssoRequired,
          sessionRisk,
        ]
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        emailConfirmed:
          type: boolean
        assuranceLevel:
          type: string
          enum: [aal1, aal2]
        mfaRequiredForAdminActions:
          type: boolean
        currentRoles:
          type: array
          items:
            type: string
        activeSessionCount:
          type: integer
        ssoRequired:
          type: boolean
        sessionRisk:
          type: string
          enum: [low, medium, high]
    AuditEventSummary:
      type: object
      required:
        [
          id,
          occurredAt,
          actorUserId,
          actorEmail,
          workspaceId,
          action,
          entityType,
          entityId,
          result,
          reasonCode,
          requestId,
          traceId,
          eventCategory,
          sessionId,
          dataClass,
          metadata,
        ]
      properties:
        id:
          type: string

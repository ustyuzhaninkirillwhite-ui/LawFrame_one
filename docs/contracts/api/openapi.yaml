openapi: 3.1.0
info:
  title: LexFrame Stage 8 API
  version: 0.8.0
  description: Canonical HTTP contract for the LexFrame stage 8 execution core, embedded builder, approval inbox, artifact handling, delivery and notifications.
servers:
  - url: http://localhost:3100
paths:
  /auth/bootstrap:
    post:
      operationId: bootstrapAuth
      tags: [Auth]
      responses:
        "200":
          description: Profile ensured and auth bootstrap completed.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok
  /session/context:
    get:
      operationId: getSessionContext
      tags: [Session]
      parameters:
        - in: header
          name: x-workspace-id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
  /account/security:
    get:
      operationId: getAccountSecurity
      tags: [Security]
      responses:
        "200":
          description: Security posture of the current account/session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityAccountState"
  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [Workspace]
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceSummary"
    post:
      operationId: createWorkspace
      tags: [Workspace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: Created workspace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
  /workspaces/{workspaceId}:
    get:
      operationId: getWorkspace
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
    patch:
      operationId: updateWorkspace
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Updated workspace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
  /workspaces/{workspaceId}/switch:
    post:
      operationId: switchWorkspace
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Refreshed session context for the new workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
  /workspaces/{workspaceId}/members:
    get:
      operationId: listWorkspaceMembers
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
  /workspaces/{workspaceId}/members/{memberId}/role:
    patch:
      operationId: changeWorkspaceMemberRole
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceMemberRoleRequest"
      responses:
        "200":
          description: Updated workspace member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
  /workspaces/{workspaceId}/members/{memberId}:
    delete:
      operationId: removeWorkspaceMember
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Member removal result
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: removed
  /workspaces/{workspaceId}/invitations:
    get:
      operationId: listWorkspaceInvitations
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceInvitation"
    post:
      operationId: createWorkspaceInvitation
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceInvitationRequest"
      responses:
        "200":
          description: Created workspace invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceInvitation"
  /workspaces/{workspaceId}/invitations/{invitationId}:
    delete:
      operationId: revokeWorkspaceInvitation
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/InvitationId"
      responses:
        "200":
          description: Invitation revocation result
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: revoked
  /workspace-invitations/accept:
    post:
      operationId: acceptWorkspaceInvitation
      tags: [Workspace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptWorkspaceInvitationRequest"
      responses:
        "200":
          description: Refreshed session context after invitation acceptance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
  /rbac/roles:
    get:
      operationId: listRoles
      tags: [RBAC]
      responses:
        "200":
          description: Role definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleDefinition"
  /rbac/permissions:
    get:
      operationId: listPermissions
      tags: [RBAC]
      responses:
        "200":
          description: Permission definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionDefinition"
  /audit/events:
    get:
      operationId: listAuditEvents
      tags: [Audit]
      responses:
        "200":
          description: Recent workspace audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEventSummary"
  /admin/security/overview:
    get:
      operationId: getAdminSecurityOverview
      tags: [Security]
      responses:
        "200":
          description: Stage 11 security overview with release gates and critical alerts
          content:
            application/json:
              schema:
                type: object
  /admin/security/sessions:
    get:
      operationId: listSecuritySessions
      tags: [Security]
      responses:
        "200":
          description: Active and revoked workspace sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/security/sessions/{sessionId}/revoke:
    post:
      operationId: revokeSecuritySession
      tags: [Security]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
  /admin/security/workspace-policies:
    get:
      operationId: getWorkspaceSecuritySettings
      tags: [Security]
      responses:
        "200":
          description: Workspace security settings
          content:
            application/json:
              schema:
                type: object
    patch:
      operationId: updateWorkspaceSecuritySettings
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated workspace security settings
          content:
            application/json:
              schema:
                type: object
  /security/reauth/challenge:
    post:
      operationId: createReauthChallenge
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Created reauthentication challenge
          content:
            application/json:
              schema:
                type: object
  /security/reauth/verify:
    post:
      operationId: verifyReauthChallenge
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Verified reauthentication challenge
          content:
            application/json:
              schema:
                type: object
  /admin/security/secrets:
    get:
      operationId: listSecretsInventory
      tags: [Security]
      responses:
        "200":
          description: Secret inventory metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/security/audit-events:
    get:
      operationId: listAuditEventsAdmin
      tags: [Security]
      responses:
        "200":
          description: Security admin view of audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEventSummary"
  /admin/security/audit/export:
    post:
      operationId: exportAuditEvents
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Exported audit payload
          content:
            application/json:
              schema:
                type: object
  /admin/security/ai/policies:
    get:
      operationId: listAiProviderPolicies
      tags: [Security, AI]
      responses:
        "200":
          description: AI provider policy registry
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/security/activepieces:
    get:
      operationId: getActivepiecesSecurityOverview
      tags: [Security, Activepieces]
      responses:
        "200":
          description: Activepieces governance overview
          content:
            application/json:
              schema:
                type: object
  /admin/security/alerts:
    get:
      operationId: listSecurityAlerts
      tags: [Security]
      responses:
        "200":
          description: Security alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/security/alerts/{alertId}:
    patch:
      operationId: updateSecurityAlert
      tags: [Security]
      parameters:
        - in: path
          name: alertId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated security alert
          content:
            application/json:
              schema:
                type: object
  /admin/security/incidents:
    get:
      operationId: listSecurityIncidents
      tags: [Security]
      responses:
        "200":
          description: Security incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      operationId: createSecurityIncident
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Created security incident
          content:
            application/json:
              schema:
                type: object
  /admin/security/incidents/{incidentId}:
    patch:
      operationId: updateSecurityIncident
      tags: [Security]
      parameters:
        - in: path
          name: incidentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated security incident
          content:
            application/json:
              schema:
                type: object
  /admin/compliance/processing-activities:
    get:
      operationId: listComplianceProcessingActivities
      tags: [Compliance]
      responses:
        "200":
          description: Processing activities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/compliance/retention-policies:
    get:
      operationId: listRetentionPolicies
      tags: [Compliance]
      responses:
        "200":
          description: Retention policies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/compliance/retention/report:
    get:
      operationId: getRetentionReport
      tags: [Compliance]
      responses:
        "200":
          description: Retention and legal hold overview
          content:
            application/json:
              schema:
                type: object
  /admin/compliance/dsr:
    get:
      operationId: listDsrRequests
      tags: [Compliance]
      responses:
        "200":
          description: Data subject requests
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/compliance/access-reviews:
    get:
      operationId: listAccessReviewCampaigns
      tags: [Compliance]
      responses:
        "200":
          description: Access review campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /library:
    get:
      operationId: listLibraryTemplates
      tags: [Library]
      responses:
        "200":
          description: Library templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryTemplateSummary"
  /legal-modules:
    get:
      operationId: listLegalModules
      tags: [Modules]
      responses:
        "200":
          description: Legal module registry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegalModuleSummary"
  /legal-modules/{code}:
    get:
      operationId: getLegalModule
      tags: [Modules]
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detailed legal module payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalModuleDetail"
  /legal-modules/validate-step:
    post:
      operationId: validateLegalModuleStep
      tags: [Modules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateLegalModuleStepRequest"
      responses:
        "200":
          description: Module step validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowValidationSummary"
  /canvas/block-types:
    get:
      operationId: listCanvasBlockTypes
      tags: [Canvas]
      responses:
        "200":
          description: Canvas block registry available to the current workspace.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CanvasBlockDefinition"
  /canvas/block-types/{code}:
    get:
      operationId: getCanvasBlockType
      tags: [Canvas]
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single Canvas block definition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasBlockDefinition"
  /canvas/block-types/{code}/schema:
    get:
      operationId: getCanvasBlockTypeSchema
      tags: [Canvas]
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: JSON schemas and handles for a Canvas block.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasBlockSchemaResponse"
  /canvas/modules:
    get:
      operationId: listCanvasModuleCatalog
      tags: [Canvas]
      parameters:
        - in: query
          name: automation_id
          required: false
          schema: { type: string }
        - in: query
          name: draft_version_id
          required: false
          schema: { type: string }
        - in: query
          name: context_node_id
          required: false
          schema: { type: string }
        - in: query
          name: insert_position
          required: false
          schema:
            $ref: "#/components/schemas/CanvasInsertPosition"
        - in: query
          name: mode
          required: false
          schema:
            type: string
            enum: [palette, inline, quick_add, recommended]
        - in: query
          name: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Backend-owned Canvas module catalog with availability, recommendations, recent, favorites, policy and runtime summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasModuleCatalogResponse"
  /canvas/modules/{moduleCode}:
    get:
      operationId: getCanvasModuleDetail
      tags: [Canvas]
      parameters:
        - in: path
          name: moduleCode
          required: true
          schema: { type: string }
        - in: query
          name: automation_id
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Detail drawer data for a Canvas module.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasModuleDetail"
  /canvas/modules/{moduleCode}/compatibility-check:
    post:
      operationId: checkCanvasModuleCompatibility
      tags: [Canvas]
      parameters:
        - in: path
          name: moduleCode
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CanvasCompatibilityCheckRequest"
      responses:
        "200":
          description: Pre-insert compatibility and missing requirement result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasCompatibilityCheckResponse"
  /connections/requirements:
    get:
      operationId: listCanvasConnectionRequirements
      tags: [Connections]
      parameters:
        - in: query
          name: module_code
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Missing connection requirements for module remediation flows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasConnectionRequirementsResponse"
  /connections/requests:
    post:
      operationId: createCanvasConnectionRequest
      tags: [Connections]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                module_code:
                  type: string
                connection_type:
                  type: string
              additionalProperties: true
      responses:
        "200":
          description: Created missing connection request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasConnectionRequestResponse"
  /canvas/validate-block:
    post:
      operationId: validateCanvasBlock
      tags: [Canvas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCanvasBlockRequest"
      responses:
        "200":
          description: Block validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasBlockValidationResult"
  /canvas/validate-connection:
    post:
      operationId: validateCanvasConnection
      tags: [Canvas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCanvasConnectionRequest"
      responses:
        "200":
          description: Connection validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasConnectionValidationResult"
  /canvas/preview-block:
    post:
      operationId: previewCanvasBlock
      tags: [Canvas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CanvasBlockCodeRequest"
      responses:
        "200":
          description: Safe runtime mapping preview for a Canvas block.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasRuntimeMapping"
  /canvas/test-block:
    post:
      operationId: testCanvasBlock
      tags: [Canvas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CanvasBlockCodeRequest"
      responses:
        "200":
          description: Safe step-test contour without external delivery.
          content:
            application/json:
              schema:
                type: object
                required: [status, blockCode, runtime, diagnostics]
                properties:
                  status:
                    type: string
                    enum: [ready, blocked]
                  blockCode:
                    type: string
                  runtime:
                    $ref: "#/components/schemas/CanvasRuntimeMapping"
                  diagnostics:
                    type: array
                    items:
                      type: string
  /automations/{automationId}/canvas:
    get:
      operationId: getAutomationCanvas
      tags: [Canvas]
      parameters:
        - in: path
          name: automationId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backend-owned canonical Canvas state for the active Workflow DSL v2 draft.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasState"
  /automations/{automationId}/canvas/drafts:
    post:
      operationId: openAutomationCanvasDraft
      tags: [Canvas]
      parameters:
        - in: path
          name: automationId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CanvasDraftRequest"
      responses:
        "200":
          description: Existing editable draft opened or a new draft created from the requested source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasDraftOpenResponse"
  /automations/{automationId}/canvas/version-state:
    get:
      operationId: getAutomationCanvasVersionState
      tags: [Canvas]
      parameters:
        - in: path
          name: automationId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Canvas version lifecycle state for the automation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasVersionStateResponse"
  /automations/{automationId}/canvas/versions:
    get:
      operationId: listAutomationCanvasVersions
      tags: [Canvas]
      parameters:
        - in: path
          name: automationId
          required: true
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
        - in: query
          name: include_checkpoints
          required: false
          schema:
            type: boolean
        - in: query
          name: cursor
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Read-only immutable Canvas version history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasVersionListResponse"
  /automations/{automationId}/canvas/versions/compare:
    get:
      operationId: compareAutomationCanvasVersions
      tags: [Canvas]
      parameters:
        - in: path
          name: automationId
          required: true
          schema:
            type: string
        - in: query
          name: from
          required: true
          schema:
            type: string
        - in: query
          name: to
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Semantic diff between two Canvas versions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasVersionCompareResponse"
  /automations/{automationId}/canvas/versions/{versionId}/runtime-projection:
    get:
      operationId: getAutomationCanvasRuntimeProjection
      tags: [Canvas]
      parameters:
        - in: path
          name: automationId
          required: true
          schema:
            type: string
        - in: path
          name: versionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Immutable runtime projection generated for a published Canvas version.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasRuntimeProjectionVersion"
  /automations/{automationId}/canvas/versions/{versionId}/export:
    get:
      operationId: exportAutomationCanvasVersion
      tags: [Canvas]
      parameters:
        - in: path
          name: automationId
          required: true
          schema:
            type: string
        - in: path
          name: versionId

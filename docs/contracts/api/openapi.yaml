openapi: 3.1.0
info:
  title: LexFrame Stage 8 API
  version: 0.8.0
  description: Canonical HTTP contract for the LexFrame stage 8 execution core, embedded builder, approval inbox, artifact handling, delivery and notifications.
servers:
  - url: http://localhost:3100
paths:
  /auth/bootstrap:
    post:
      operationId: bootstrapAuth
      tags: [Auth]
      responses:
        "200":
          description: Profile ensured and auth bootstrap completed.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok
  /session/context:
    get:
      operationId: getSessionContext
      tags: [Session]
      parameters:
        - in: header
          name: x-workspace-id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
  /account/security:
    get:
      operationId: getAccountSecurity
      tags: [Security]
      responses:
        "200":
          description: Security posture of the current account/session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityAccountState"
  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [Workspace]
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceSummary"
    post:
      operationId: createWorkspace
      tags: [Workspace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: Created workspace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
  /workspaces/{workspaceId}:
    get:
      operationId: getWorkspace
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
    patch:
      operationId: updateWorkspace
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Updated workspace summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSummary"
  /workspaces/{workspaceId}/switch:
    post:
      operationId: switchWorkspace
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Refreshed session context for the new workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
  /workspaces/{workspaceId}/members:
    get:
      operationId: listWorkspaceMembers
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
  /workspaces/{workspaceId}/members/{memberId}/role:
    patch:
      operationId: changeWorkspaceMemberRole
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceMemberRoleRequest"
      responses:
        "200":
          description: Updated workspace member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
  /workspaces/{workspaceId}/members/{memberId}:
    delete:
      operationId: removeWorkspaceMember
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "200":
          description: Member removal result
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: removed
  /workspaces/{workspaceId}/invitations:
    get:
      operationId: listWorkspaceInvitations
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Workspace invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceInvitation"
    post:
      operationId: createWorkspaceInvitation
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceInvitationRequest"
      responses:
        "200":
          description: Created workspace invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceInvitation"
  /workspaces/{workspaceId}/invitations/{invitationId}:
    delete:
      operationId: revokeWorkspaceInvitation
      tags: [Workspace]
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/InvitationId"
      responses:
        "200":
          description: Invitation revocation result
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: revoked
  /workspace-invitations/accept:
    post:
      operationId: acceptWorkspaceInvitation
      tags: [Workspace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptWorkspaceInvitationRequest"
      responses:
        "200":
          description: Refreshed session context after invitation acceptance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionContext"
  /rbac/roles:
    get:
      operationId: listRoles
      tags: [RBAC]
      responses:
        "200":
          description: Role definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleDefinition"
  /rbac/permissions:
    get:
      operationId: listPermissions
      tags: [RBAC]
      responses:
        "200":
          description: Permission definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionDefinition"
  /audit/events:
    get:
      operationId: listAuditEvents
      tags: [Audit]
      responses:
        "200":
          description: Recent workspace audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEventSummary"
  /admin/security/overview:
    get:
      operationId: getAdminSecurityOverview
      tags: [Security]
      responses:
        "200":
          description: Stage 11 security overview with release gates and critical alerts
          content:
            application/json:
              schema:
                type: object
  /admin/security/sessions:
    get:
      operationId: listSecuritySessions
      tags: [Security]
      responses:
        "200":
          description: Active and revoked workspace sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/security/sessions/{sessionId}/revoke:
    post:
      operationId: revokeSecuritySession
      tags: [Security]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
  /admin/security/workspace-policies:
    get:
      operationId: getWorkspaceSecuritySettings
      tags: [Security]
      responses:
        "200":
          description: Workspace security settings
          content:
            application/json:
              schema:
                type: object
    patch:
      operationId: updateWorkspaceSecuritySettings
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated workspace security settings
          content:
            application/json:
              schema:
                type: object
  /security/reauth/challenge:
    post:
      operationId: createReauthChallenge
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Created reauthentication challenge
          content:
            application/json:
              schema:
                type: object
  /security/reauth/verify:
    post:
      operationId: verifyReauthChallenge
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Verified reauthentication challenge
          content:
            application/json:
              schema:
                type: object
  /admin/security/secrets:
    get:
      operationId: listSecretsInventory
      tags: [Security]
      responses:
        "200":
          description: Secret inventory metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/security/audit-events:
    get:
      operationId: listAuditEventsAdmin
      tags: [Security]
      responses:
        "200":
          description: Security admin view of audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEventSummary"
  /admin/security/audit/export:
    post:
      operationId: exportAuditEvents
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Exported audit payload
          content:
            application/json:
              schema:
                type: object
  /admin/security/ai/policies:
    get:
      operationId: listAiProviderPolicies
      tags: [Security, AI]
      responses:
        "200":
          description: AI provider policy registry
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/security/activepieces:
    get:
      operationId: getActivepiecesSecurityOverview
      tags: [Security, Activepieces]
      responses:
        "200":
          description: Activepieces governance overview
          content:
            application/json:
              schema:
                type: object
  /admin/security/alerts:
    get:
      operationId: listSecurityAlerts
      tags: [Security]
      responses:
        "200":
          description: Security alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/security/alerts/{alertId}:
    patch:
      operationId: updateSecurityAlert
      tags: [Security]
      parameters:
        - in: path
          name: alertId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated security alert
          content:
            application/json:
              schema:
                type: object
  /admin/security/incidents:
    get:
      operationId: listSecurityIncidents
      tags: [Security]
      responses:
        "200":
          description: Security incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      operationId: createSecurityIncident
      tags: [Security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Created security incident
          content:
            application/json:
              schema:
                type: object
  /admin/security/incidents/{incidentId}:
    patch:
      operationId: updateSecurityIncident
      tags: [Security]
      parameters:
        - in: path
          name: incidentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated security incident
          content:
            application/json:
              schema:
                type: object
  /admin/compliance/processing-activities:
    get:
      operationId: listComplianceProcessingActivities
      tags: [Compliance]
      responses:
        "200":
          description: Processing activities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/compliance/retention-policies:
    get:
      operationId: listRetentionPolicies
      tags: [Compliance]
      responses:
        "200":
          description: Retention policies
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/compliance/retention/report:
    get:
      operationId: getRetentionReport
      tags: [Compliance]
      responses:
        "200":
          description: Retention and legal hold overview
          content:
            application/json:
              schema:
                type: object
  /admin/compliance/dsr:
    get:
      operationId: listDsrRequests
      tags: [Compliance]
      responses:
        "200":
          description: Data subject requests
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /admin/compliance/access-reviews:
    get:
      operationId: listAccessReviewCampaigns
      tags: [Compliance]
      responses:
        "200":
          description: Access review campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /library:
    get:
      operationId: listLibraryTemplates
      tags: [Library]
      responses:
        "200":
          description: Library templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryTemplateSummary"
  /legal-modules:
    get:
      operationId: listLegalModules
      tags: [Modules]
      responses:
        "200":
          description: Legal module registry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegalModuleSummary"
  /legal-modules/{code}:
    get:
      operationId: getLegalModule
      tags: [Modules]
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detailed legal module payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalModuleDetail"
  /legal-modules/validate-step:
    post:
      operationId: validateLegalModuleStep
      tags: [Modules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateLegalModuleStepRequest"
      responses:
        "200":
          description: Module step validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowValidationSummary"
  /admin/legal-modules:
    get:
      operationId: listAdminLegalModules
      tags: [Admin Modules]
      responses:
        "200":
          description: Admin-visible legal module registry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegalModuleSummary"
    post:
      operationId: createLegalModule
      tags: [Admin Modules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, title, category, description, riskLevel]
              properties:
                code:
                  type: string
                title:
                  type: string
                category:
                  type: string
                description:
                  type: string
                riskLevel:
                  type: string
                  enum: [low, medium, high]
      responses:
        "200":
          description: Created legal module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalModuleDetail"
  /admin/legal-modules/{code}/versions:
    post:
      operationId: createLegalModuleVersion
      tags: [Admin Modules]
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  version,
                  inputSchema,
                  outputSchema,
                  requirements,
                  runtimeMapping,
                  examples,
                ]
              properties:
                version:
                  type: string
                inputSchema:
                  type: array
                  items:
                    $ref: "#/components/schemas/LegalModuleIoSchema"
                outputSchema:
                  type: array
                  items:
                    $ref: "#/components/schemas/LegalModuleIoSchema"
                requirements:
                  type: array
                  items:
                    $ref: "#/components/schemas/TemplateRequirement"
                runtimeMapping:
                  type: object
                  additionalProperties: true
                examples:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated legal module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalModuleDetail"
  /admin/legal-modules/{code}/versions/{version}/publish:
    post:
      operationId: publishLegalModuleVersion
      tags: [Admin Modules]
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
        - in: path
          name: version
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Legal module detail after publication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalModuleDetail"
  /admin/legal-modules/{code}/versions/{version}/deprecate:
    post:
      operationId: deprecateLegalModuleVersion
      tags: [Admin Modules]
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
        - in: path
          name: version
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Legal module detail after deprecation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalModuleDetail"
  /automation-templates:
    get:
      operationId: listAutomationTemplates
      tags: [Library]
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: scope
          required: false
          schema:
            type: string
            enum: [product, workspace, public, private]
        - in: query
          name: owner
          required: false
          schema:
            type: string
            enum: [lexframe, workspace, public, private]
        - in: query
          name: mine
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Visible automation templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryTemplateSummary"
    post:
      operationId: createAutomationTemplate
      tags: [Library]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationTemplateRequest"
      responses:
        "200":
          description: Created automation template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTemplateDetail"
  /automation-templates/{id}:
    get:
      operationId: getAutomationTemplate
      tags: [Library]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detailed automation template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTemplateDetail"
    patch:
      operationId: updateAutomationTemplate
      tags: [Library]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationTemplateRequest"
      responses:
        "200":
          description: Updated automation template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTemplateDetail"
  /automation-templates/{id}/versions:
    post:
      operationId: createAutomationTemplateVersion
      tags: [Library]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationTemplateVersionRequest"
      responses:
        "200":
          description: Created draft template version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTemplateVersionSummary"
  /automation-templates/{id}/install:
    post:
      operationId: installAutomationTemplate
      tags: [Library]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallAutomationTemplateRequest"
      responses:
        "200":
          description: Installed automation copy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledAutomationDetail"
  /automation-templates/{id}/fork:
    post:
      operationId: forkAutomationTemplate
      tags: [Library]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForkAutomationTemplateRequest"
      responses:
        "200":
          description: Forked automation template detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTemplateDetail"
  /automation-templates/{id}/related:
    get:
      operationId: getRelatedAutomationTemplates
      tags: [Library]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Related automation templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibraryTemplateSummary"
  /automation-templates/{id}/submit-publication:
    post:
      operationId: submitAutomationTemplatePublication
      tags: [Moderation]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPublicationRequest"
      responses:
        "200":
          description: Created publication request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationRequest"
  /automation-template-versions/{id}/validate:
    post:
      operationId: validateAutomationTemplateVersion
      tags: [Library]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template workflow validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowValidationSummary"
  /automation-template-versions/{id}/publish-draft:
    post:
      operationId: publishAutomationTemplateDraft
      tags: [Library]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template detail after draft publication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationTemplateDetail"
  /automations:
    get:
      operationId: listInstalledAutomations
      tags: [Automation]
      responses:
        "200":
          description: Installed automations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstalledAutomationDetail"
  /automations/{id}:
    get:
      operationId: getAutomationDetail
      tags: [Automation]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Automation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledAutomationDetail"
  /installed-automations/{id}/fork-to-template:
    post:
      operationId: forkInstalledAutomationToTemplate
      tags: [Automation]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForkAutomationTemplateRequest"
      responses:
        "200":
          description: New workspace template created from installed automation
          content:
            application/json:
              schema:

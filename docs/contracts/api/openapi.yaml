components:
  parameters:
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
    MemberId:
      in: path
      name: memberId
      required: true
      schema:
        type: string
    InvitationId:
      in: path
      name: invitationId
      required: true
      schema:
        type: string
    DocumentId:
      in: path
      name: documentId
      required: true
      schema:
        type: string
    VersionId:
      in: path
      name: versionId
      required: true
      schema:
        type: string
    RunId:
      in: path
      name: runId
      required: true
      schema:
        type: string
    LegalSourceId:
      in: path
      name: sourceId
      required: true
      schema:
        type: string
    LegalImportJobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
    RagRequestId:
      in: path
      name: requestId
      required: true
      schema:
        type: string
  schemas:
    CanvasApiError:
      type: object
      required: [code, message, trace_id]
      properties:
        code:
          type: string
          enum:
            [
              CANVAS_PERMISSION_DENIED,
              CANVAS_LOCK_REQUIRED,
              CANVAS_LOCK_OWNED_BY_ANOTHER_USER,
              CANVAS_REVISION_CONFLICT,
              CANVAS_DRAFT_NOT_EDITABLE,
              CANVAS_OPERATION_INVALID,
              CANVAS_POLICY_VIOLATION,
              CANVAS_PUBLISH_VALIDATION_FAILED,
            ]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        affected_nodes:
          type: array
          items:
            type: string
        affected_edges:
          type: array
          items:
            type: string
        trace_id:
          type: string
    CanvasDraftStatus:
      type: string
      enum:
        [
          editing,
          validating,
          valid,
          invalid,
          ready_to_publish,
          published_to_version,
          conflict,
          archived,
          draft,
          published,
          restored,
          runtime_synced,
          runtime_modified,
        ]
    CanvasValidationIssue:
      type: object
      required: [id, severity, scope, code, title, message]
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [error, warning, policy_block]
        scope:
          type: string
          enum: [workflow, node, edge, binding, runtime]
        code:
          type: string
        title:
          type: string
        message:
          type: string
        affected_node_id:
          type: [string, "null"]
        affected_edge_id:
          type: [string, "null"]
        affected_binding_id:
          type: [string, "null"]
        affected_input_key:
          type: [string, "null"]
        suggested_fix:
          type: [string, "null"]
        suggested_transform:
          type: [string, "null"]
        suggested_action:
          type: [object, "null"]
          additionalProperties: true
    CanvasValidationSummary:
      type: object
      required:
        [
          status,
          errors_count,
          warnings_count,
          policy_blocks_count,
          issues,
          can_save,
          can_test,
          can_publish,
          can_compile,
          can_run,
        ]
      properties:
        status:
          type: string
          enum: [valid, valid_with_warnings, invalid]
        errors_count:
          type: integer
          minimum: 0
        warnings_count:
          type: integer
          minimum: 0
        policy_blocks_count:
          type: integer
          minimum: 0
        issues:
          type: array
          items:
            $ref: "#/components/schemas/CanvasValidationIssue"

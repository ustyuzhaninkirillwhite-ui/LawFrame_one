services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082
    ports:
      - "19092:19092"
      - "8082:8082"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    profiles: ["analytics"]
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/analytics/clickhouse/init:/docker-entrypoint-initdb.d

  activepieces-postgres:
    image: postgres:16-alpine
    profiles: ["optional-runtime", "local-integrated"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: activepieces
    ports:
      - "54323:5432"
    volumes:
      - activepieces_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d activepieces"]
      interval: 5s
      timeout: 5s
      retries: 20

  activepieces-redis:
    image: redis:7-alpine
    profiles: ["optional-runtime", "local-integrated"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    profiles: ["optional-runtime", "local-integrated"]
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-LexFrameSearch!2026}
    ports:
      - "9200:9200"

  storage-sandbox:
    build:
      context: .
      dockerfile: ./infra/storage-sandbox/Dockerfile
    profiles: ["local-integrated"]
    environment:
      STORAGE_SANDBOX_PORT: 54321
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-stage14_supabase_secret_key}
    ports:
      - "54321:54321"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:54321/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  delivery-sandbox:
    build:
      context: .
      dockerfile: ./infra/delivery-sandbox/Dockerfile
    profiles: ["local-integrated"]
    environment:
      DELIVERY_SANDBOX_PORT: 8091
      DELIVERY_SANDBOX_TOKEN: ${LEXFRAME_DELIVERY_WEBHOOK_TOKEN:-}
    ports:
      - "8091:8091"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:8091/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  activepieces-app:
    image: activepieces/activepieces:0.44.0
    profiles: ["optional-runtime", "local-integrated"]
    environment:
      AP_DATABASE_TYPE: POSTGRES
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_HOST: activepieces-postgres
      AP_POSTGRES_PORT: 5432
      AP_POSTGRES_USERNAME: postgres
      AP_POSTGRES_PASSWORD: postgres
      AP_REDIS_HOST: activepieces-redis
      AP_REDIS_PORT: 6379
      AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
      AP_CONTAINER_TYPE: APP
      AP_FRONTEND_URL: http://127.0.0.1:8080
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:-00112233445566778899aabbccddeeff}
      AP_JWT_SECRET: ${AP_JWT_SECRET:-00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}
      AP_ENVIRONMENT: development
    depends_on:
      activepieces-postgres:
        condition: service_healthy
      activepieces-redis:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:80', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  activepieces-worker:
    image: activepieces/activepieces:0.44.0
    profiles: ["optional-runtime", "local-integrated"]
    environment:
      AP_DATABASE_TYPE: POSTGRES
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_HOST: activepieces-postgres
      AP_POSTGRES_PORT: 5432
      AP_POSTGRES_USERNAME: postgres
      AP_POSTGRES_PASSWORD: postgres
      AP_REDIS_HOST: activepieces-redis
      AP_REDIS_PORT: 6379
      AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
      AP_CONTAINER_TYPE: WORKER
      AP_FRONTEND_URL: http://activepieces-app:80
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:-00112233445566778899aabbccddeeff}
      AP_JWT_SECRET: ${AP_JWT_SECRET:-00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}
      AP_ENVIRONMENT: development
    depends_on:
      activepieces-postgres:
        condition: service_healthy
      activepieces-redis:
        condition: service_healthy
      activepieces-app:
        condition: service_healthy

  mining-worker:
    build:
      context: ./apps/mining-worker
    profiles: ["analytics"]
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/postgres
      REDPANDA_BROKERS: redpanda:9092
      CLICKHOUSE_URL: http://clickhouse:8123
      POSTHOG_DISABLED: "true"
      STAGE9_NGRAM_WINDOW_DAYS: "14"
      STAGE9_VARIANT_WINDOW_DAYS: "30"
      STAGE9_TEAM_MODEL_WINDOW_DAYS: "90"
      STAGE9_SYNTHETIC_SESSION_TIMEOUT_MINUTES: "30"
    depends_on:
      - postgres
      - redpanda
      - clickhouse

volumes:
  postgres_data:
  activepieces_postgres_data:
  clickhouse_data:

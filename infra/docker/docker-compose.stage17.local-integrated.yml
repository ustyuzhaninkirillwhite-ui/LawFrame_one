name: lexframe-stage17

services:
  lexframe-product-postgres:
    image: postgres:16-alpine
    profiles: ["local-integrated"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/lexframe_product_postgres_password
      POSTGRES_DB: stage17_runtime
    secrets:
      - lexframe_product_postgres_password
    volumes:
      - lexframe-product-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stage17_runtime"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [stage17-runtime]

  lexframe-product-db-bootstrap:
    build:
      context: ../..
      dockerfile: infra/stage16-db-bootstrap/Dockerfile
    profiles: ["local-integrated"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LEXFRAME_PRODUCT_POSTGRES_PASSWORD:?run pnpm stage17:init-local-secrets}
      LEXFRAME_DB_NAME: stage17_runtime
    depends_on:
      lexframe-product-postgres:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        export PGPASSWORD="$${POSTGRES_PASSWORD}"
        until psql -h lexframe-product-postgres -U "$${POSTGRES_USER}" -d postgres -v ON_ERROR_STOP=1 -Atc "select 1" >/dev/null 2>&1; do
          echo "[stage17-db-bootstrap] waiting for lexframe-product-postgres"
          sleep 1
        done
        psql -h lexframe-product-postgres -U "$${POSTGRES_USER}" -d postgres -v ON_ERROR_STOP=1 \
          -c "select pg_terminate_backend(pid) from pg_stat_activity where datname = '$${LEXFRAME_DB_NAME}' and pid <> pg_backend_pid();" \
          -c "drop database if exists \"$${LEXFRAME_DB_NAME}\";" \
          -c "create database \"$${LEXFRAME_DB_NAME}\";"
        psql -h lexframe-product-postgres -U "$${POSTGRES_USER}" -d "$${LEXFRAME_DB_NAME}" -v ON_ERROR_STOP=1 -f /workspace/scripts/bootstrap-local-supabase-compat.sql
        for file in /workspace/supabase/migrations/*.sql; do psql -h lexframe-product-postgres -U "$${POSTGRES_USER}" -d "$${LEXFRAME_DB_NAME}" -v ON_ERROR_STOP=1 -f "$$file"; done
        for file in /workspace/supabase/seed/*.sql; do psql -h lexframe-product-postgres -U "$${POSTGRES_USER}" -d "$${LEXFRAME_DB_NAME}" -v ON_ERROR_STOP=1 -f "$$file"; done
    networks: [stage17-runtime]

  activepieces-postgres:
    image: pgvector/pgvector:0.8.0-pg16
    profiles: ["local-integrated"]
    environment:
      POSTGRES_DB: activepieces
      POSTGRES_USER: activepieces
      POSTGRES_PASSWORD_FILE: /run/secrets/ap_postgres_password
    secrets:
      - ap_postgres_password
    volumes:
      - activepieces-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activepieces -d activepieces"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [stage17-runtime]

  activepieces-redis:
    image: redis:7-alpine
    profiles: ["local-integrated"]
    command: ["sh", "-c", "redis-server --requirepass \"$$(cat /run/secrets/ap_redis_password)\""]
    secrets:
      - ap_redis_password
    volumes:
      - activepieces-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/ap_redis_password)\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [stage17-runtime]

  activepieces-app:
    image: ghcr.io/activepieces/activepieces:0.80.1
    profiles: ["local-integrated"]
    env_file:
      - ../../.env.stage17.local
    environment:
      AP_CONTAINER_TYPE: APP
      AP_DB_TYPE: POSTGRES
      AP_DATABASE_TYPE: POSTGRES
      AP_POSTGRES_HOST: activepieces-postgres
      AP_POSTGRES_PORT: "5432"
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_USERNAME: activepieces
      AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:?run pnpm stage17:init-local-secrets}
      AP_REDIS_TYPE: STANDALONE
      AP_REDIS_HOST: activepieces-redis
      AP_REDIS_PORT: "6379"
      AP_REDIS_PASSWORD: ${AP_REDIS_PASSWORD:?run pnpm stage17:init-local-secrets}
      AP_JWT_SECRET: ${AP_JWT_SECRET:?run pnpm stage17:init-local-secrets}
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:?run pnpm stage17:init-local-secrets}
      AP_FRONTEND_URL: http://127.0.0.1:3100/automation-runtime
      AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
      AP_PIECES_SOURCE: ${AP_PIECES_SOURCE:-CLOUD_AND_DB}
      AP_PIECES_SYNC_MODE: ${AP_PIECES_SYNC_MODE:-OFFICIAL_AUTO}
      AP_NETWORK_MODE: ${ACTIVEPIECES_NETWORK_MODE:-STRICT}
      AP_SSRF_ALLOW_LIST: ${ACTIVEPIECES_SSRF_ALLOW_LIST:-http://lexframe-backend:3100}
      AP_LOAD_TRANSLATIONS_FOR_DEV_PIECES: "true"
    depends_on:
      activepieces-postgres:
        condition: service_healthy
      activepieces-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:80/api/v1/health', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 45s
    networks: [stage17-runtime]

  activepieces-worker:
    image: ghcr.io/activepieces/activepieces:0.80.1
    profiles: ["local-integrated"]
    env_file:
      - ../../.env.stage17.local
    environment:
      AP_CONTAINER_TYPE: WORKER
      AP_DB_TYPE: POSTGRES
      AP_DATABASE_TYPE: POSTGRES
      AP_POSTGRES_HOST: activepieces-postgres
      AP_POSTGRES_PORT: "5432"
      AP_POSTGRES_DATABASE: activepieces
      AP_POSTGRES_USERNAME: activepieces
      AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:?run pnpm stage17:init-local-secrets}
      AP_REDIS_TYPE: STANDALONE
      AP_REDIS_HOST: activepieces-redis
      AP_REDIS_PORT: "6379"
      AP_REDIS_PASSWORD: ${AP_REDIS_PASSWORD:?run pnpm stage17:init-local-secrets}
      AP_JWT_SECRET: ${AP_JWT_SECRET:?run pnpm stage17:init-local-secrets}
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:?run pnpm stage17:init-local-secrets}
      AP_FRONTEND_URL: http://activepieces-app:80
      AP_WORKER_TOKEN: ${AP_WORKER_TOKEN:?run pnpm stage17:init-local-secrets}
      AP_EXECUTION_MODE: SANDBOX_CODE_ONLY
      AP_PIECES_SOURCE: ${AP_PIECES_SOURCE:-CLOUD_AND_DB}
      AP_PIECES_SYNC_MODE: ${AP_PIECES_SYNC_MODE:-OFFICIAL_AUTO}
      AP_NETWORK_MODE: ${ACTIVEPIECES_NETWORK_MODE:-STRICT}
      AP_SSRF_ALLOW_LIST: ${ACTIVEPIECES_SSRF_ALLOW_LIST:-http://lexframe-backend:3100}
      AP_WORKER_CONCURRENCY: "5"
    depends_on:
      activepieces-app:
        condition: service_healthy
      activepieces-redis:
        condition: service_healthy
    volumes:
      - activepieces-worker-cache:/usr/src/app/cache
    networks: [stage17-runtime]

  lexframe-backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    image: lexframe-backend:stage17-local
    profiles: ["local-integrated"]
    env_file:
      - ../../.env.stage17.local
    environment:
      NODE_ENV: production
      PORT: 3100
      LEXFRAME_APP_BASE_URL: http://127.0.0.1:3100
      LEXFRAME_ENV_PROFILE: local
      LEXFRAME_READINESS_PROFILE: local-integrated
      LEXFRAME_DEPLOY_ENV: local
      LEXFRAME_CONTRACTS_VERSION: stage17
      LEXFRAME_RELEASE_SHA: local-stage17
      LEXFRAME_STAGE17_READINESS_ENABLED: "1"
      LEXFRAME_STAGE17_REQUIRE_WORKER_HEARTBEAT: ${LEXFRAME_STAGE17_REQUIRE_WORKER_HEARTBEAT:-0}
      LEXFRAME_STAGE17_REQUIRE_UX_ARTIFACTS: ${LEXFRAME_STAGE17_REQUIRE_UX_ARTIFACTS:-0}
      LEXFRAME_AP_DESIGN_SYSTEM_ENABLED: ${LEXFRAME_AP_DESIGN_SYSTEM_ENABLED:-1}
      LEXFRAME_LOCAL_KEYS_FILE: /run/lexframe-local-secrets/lexframe.keys.local.json
      LEXFRAME_LOCAL_KEYS_HOST_DIR: ${LEXFRAME_LOCAL_KEYS_HOST_DIR:-${USERPROFILE}/.lexframe/secrets}
      SUPABASE_URL: http://localhost:54321
      SUPABASE_PUBLISHABLE_KEY: demo_publishable_key
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-stage17_storage_secret_placeholder}
      SUPABASE_DB_URL: postgresql://postgres:${LEXFRAME_PRODUCT_POSTGRES_PASSWORD}@lexframe-product-postgres:5432/stage17_runtime
      ACTIVEPIECES_BASE_URL: http://activepieces-app:80
      ACTIVEPIECES_PUBLIC_URL: http://127.0.0.1:3100/automation-runtime
      ACTIVEPIECES_REVERSE_PROXY_HEALTH_URL: http://reverse-proxy/automation-runtime/api/v1/health
      ACTIVEPIECES_API_KEY_SECRET_REF: stage17/activepieces/api-key
      ACTIVEPIECES_API_KEY_FILE: /run/lexframe-stage17-secrets/activepieces_api_key.txt
      ACTIVEPIECES_SIGNING_PRIVATE_KEY_SECRET_REF: stage17/activepieces/signing-private-key
      ACTIVEPIECES_SIGNING_PRIVATE_KEY_FILE: /run/lexframe-stage17-secrets/activepieces_signing_private_key.pem
      ACTIVEPIECES_SIGNING_KEY_ID: stage17-local-signing-key
      ACTIVEPIECES_WORKER_TOKEN_SECRET_REF: stage17/activepieces/worker-token
      ACTIVEPIECES_WORKER_CACHE_MOUNT_PATH: /usr/src/app/cache
      ACTIVEPIECES_POSTGRES_HOST: activepieces-postgres
      ACTIVEPIECES_POSTGRES_PORT: "5432"
      ACTIVEPIECES_POSTGRES_DATABASE: activepieces
      ACTIVEPIECES_POSTGRES_USERNAME: activepieces
      ACTIVEPIECES_POSTGRES_PASSWORD_FILE: /run/lexframe-stage17-secrets/ap_postgres_password.txt
      ACTIVEPIECES_REDIS_HOST: activepieces-redis
      ACTIVEPIECES_REDIS_PORT: "6379"
      ACTIVEPIECES_REDIS_PASSWORD_FILE: /run/lexframe-stage17-secrets/ap_redis_password.txt
      ACTIVEPIECES_REDIS_TYPE: STANDALONE
      ACTIVEPIECES_NETWORK_MODE: ${ACTIVEPIECES_NETWORK_MODE:-STRICT}
      ACTIVEPIECES_SSRF_ALLOW_LIST: ${ACTIVEPIECES_SSRF_ALLOW_LIST:-http://lexframe-backend:3100}
      ACTIVEPIECES_MVP_CANVAS_ENABLED: "1"
      ACTIVEPIECES_CATALOG_MODE: ${ACTIVEPIECES_CATALOG_MODE:-max}
      ACTIVEPIECES_FORCE_RU_LOCALE: "1"
      ACTIVEPIECES_BRAND_DISPLAY_NAME: Автоматизация
      ACTIVEPIECES_SIMULATE_RUNS: "0"
      AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-mock}
      LEXFRAME_RUNTIME_MASTER_SECRET: ${LEXFRAME_RUNTIME_MASTER_SECRET:?run pnpm stage17:init-local-secrets}
      LEXFRAME_DELIVERY_TRANSPORT: disabled
      OPENSEARCH_URL: http://127.0.0.1:9200
      TEMPORAL_ADDRESS: 127.0.0.1:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: lexframe-legal
      POSTHOG_KEY: phc_stage_local
      GRAFANA_BASE_URL: http://127.0.0.1:3001
      SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0
    depends_on:
      lexframe-product-db-bootstrap:
        condition: service_completed_successfully
      activepieces-app:
        condition: service_healthy
      activepieces-redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: ${LEXFRAME_LOCAL_KEYS_HOST_DIR:-${USERPROFILE}/.lexframe/secrets}
        target: /run/lexframe-local-secrets
        read_only: true
      - type: bind
        source: ../../.local/secrets/stage17
        target: /run/lexframe-stage17-secrets
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3100/health/live', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks: [stage17-runtime]

  lexframe-web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3100/api
        NEXT_PUBLIC_ACTIVEPIECES_INSTANCE_URL: http://127.0.0.1:3100/automation-runtime
        NEXT_PUBLIC_ACTIVEPIECES_RUNTIME_URL: http://127.0.0.1:3100/automation-runtime
        NEXT_PUBLIC_ACTIVEPIECES_MVP_CANVAS_ENABLED: "1"
        NEXT_PUBLIC_LEXFRAME_CANVAS_RESERVE_ENABLED: "0"
        NEXT_PUBLIC_LEXFRAME_AP_DESIGN_SYSTEM_ENABLED: "1"
        NEXT_PUBLIC_ACTIVEPIECES_EMBED_SDK_URL: /vendor/activepieces/embed-sdk-0.9.0.js
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: demo_publishable_key
        NEXT_PUBLIC_POSTHOG_KEY: phc_stage_local
        NEXT_PUBLIC_CONTRACTS_VERSION: stage17
        NEXT_PUBLIC_ENABLE_MSW: "0"
    image: lexframe-web:stage17-local
    profiles: ["local-integrated"]
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3100/api
      NEXT_PUBLIC_ACTIVEPIECES_INSTANCE_URL: http://127.0.0.1:3100/automation-runtime
      NEXT_PUBLIC_ACTIVEPIECES_RUNTIME_URL: http://127.0.0.1:3100/automation-runtime
      NEXT_PUBLIC_ACTIVEPIECES_MVP_CANVAS_ENABLED: "1"
      NEXT_PUBLIC_LEXFRAME_CANVAS_RESERVE_ENABLED: "0"
      NEXT_PUBLIC_LEXFRAME_AP_DESIGN_SYSTEM_ENABLED: "1"
      NEXT_PUBLIC_ACTIVEPIECES_EMBED_SDK_URL: /vendor/activepieces/embed-sdk-0.9.0.js
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: demo_publishable_key
      NEXT_PUBLIC_POSTHOG_KEY: phc_stage_local
      NEXT_PUBLIC_CONTRACTS_VERSION: stage17
      NEXT_PUBLIC_ENABLE_MSW: "0"
    depends_on:
      lexframe-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks: [stage17-runtime]

  reverse-proxy:
    image: nginx:1.27-alpine
    profiles: ["local-integrated"]
    depends_on:
      lexframe-web:
        condition: service_healthy
      lexframe-backend:
        condition: service_healthy
      activepieces-app:
        condition: service_healthy
    volumes:
      - ./nginx.stage17.local-integrated.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3100:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [stage17-runtime]

secrets:
  lexframe_product_postgres_password:
    file: ../../.local/secrets/stage17/lexframe_product_postgres_password.txt
  ap_postgres_password:
    file: ../../.local/secrets/stage17/ap_postgres_password.txt
  ap_redis_password:
    file: ../../.local/secrets/stage17/ap_redis_password.txt

volumes:
  lexframe-product-postgres-data:
  activepieces-postgres-data:
  activepieces-redis-data:
  activepieces-worker-cache:

networks:
  stage17-runtime:
    driver: bridge
